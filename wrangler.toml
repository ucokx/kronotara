name = "kronotara"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./build/client"

# ──────────────────────────────────────────────
# Cloudflare D1 (Serverless SQLite) binding
# Run: wrangler d1 create kronotara-db
# Then paste the database_id below
# ──────────────────────────────────────────────
[[d1_databases]]
binding = "DB"           # Accessed as env.DB in loaders/actions
database_name = "kronotara-db"
database_id = "cf7d990c-4568-4983-9fff-af7b8162f595"
migrations_dir = "migrations"

# ──────────────────────────────────────────────
# KV Namespace (optional: for session/cache)
# Run: wrangler kv:namespace create SESSION_KV
# ──────────────────────────────────────────────
# [[kv_namespaces]]
# binding = "SESSION_KV"
# id = "pubweb_kronotara_kv"

# ──────────────────────────────────────────────
# Environment variables
# ──────────────────────────────────────────────
[vars]
APP_ENV = "development"
CRON_SECRET = "default_secret_for_local_dev"

# ──────────────────────────────────────────────
# Cron Triggers (runs /api/ingest)
# ──────────────────────────────────────────────
[triggers]
crons = ["0 0 * * *"]
# ──────────────────────────────────────────────
# Local dev overrides (not deployed)
# ──────────────────────────────────────────────
[dev]
port = 8788
local_protocol = "http"
